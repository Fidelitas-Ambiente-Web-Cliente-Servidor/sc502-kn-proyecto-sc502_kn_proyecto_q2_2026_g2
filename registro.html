<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - CarpoolMatch CR</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-simple-body">

    <header class="header">
        <div class="brand">
            <h1>CarpoolMatch CR</h1>
            <p>Viajes compartidos en Costa Rica</p>
        </div>

        <nav class="nav">
            <a href="index.html">Inicio</a>
            <a href="login.html">Iniciar sesión</a>
            <a href="registro.html" class="nav-btn">Registrarse</a>
        </nav>
    </header>

    <main class="login-simple">
        <section class="login-card registro-card">
            <h2>Crear cuenta</h2>

            <p>
                Regístrate para buscar viajes, publicar rutas y compartir transporte.
            </p>

            <form id="formRegistro" class="form">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" placeholder="Ingrese su nombre completo">

                <label for="correo">Correo electrónico</label>
                <input type="email" id="correo" placeholder="ejemplo@correo.com">

                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" placeholder="Ingrese su teléfono" maxlength="8">

                <label for="tipoUsuario">Tipo de usuario</label>
                <select id="tipoUsuario">
                    <option value="">Seleccione una opción</option>
                    <option value="Conductor">Conductor</option>
                    <option value="Pasajero">Pasajero</option>
                    <option value="Ambos">Ambos</option>
                </select>

                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Ingrese una contraseña">

                <label for="confirmPassword">Confirmar contraseña</label>
                <input type="password" id="confirmPassword" placeholder="Repita la contraseña">


                <button type="submit" class="btn btn-primary full">Registrarse</button>
            </form>

            <p id="mensajeRegistro" class="message"></p>

            <p class="switch-text">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
            </p>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>

</html>
