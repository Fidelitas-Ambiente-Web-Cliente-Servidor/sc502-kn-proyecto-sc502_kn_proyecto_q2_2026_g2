<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - CarpoolMatch CR</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-simple-body">

    <header class="header">
        <div class="brand">
            <h1>CarpoolMatch CR</h1>
            <p>Viajes compartidos en Costa Rica</p>
        </div>

        <nav class="nav">
            <a href="index.html">Inicio</a>
            <a href="login.html" class="nav-btn">Iniciar sesión</a>
        </nav>
    </header>

    <main class="login-simple">
        <section class="login-card">
            <h2>Iniciar sesión</h2>

            <p>
                Ingresa tus datos para acceder a la plataforma.
            </p>

            <form id="formLogin" class="form">
                <label for="correoLogin">Correo electrónico</label>
                <input type="email" id="correoLogin" placeholder="ejemplo@correo.com">

                <label for="passwordLogin">Contraseña</label>
                <input type="password" id="passwordLogin" placeholder="Ingrese su contraseña">

                <div class="form-row">
                    <label class="check">
                        <input type="checkbox" id="recordarSesion">
                        Recordar sesión
                    </label>
                </div>

                <button type="submit" class="btn btn-primary full">Ingresar</button>
            </form>

            <p id="mensajeLogin" class="message"></p>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
